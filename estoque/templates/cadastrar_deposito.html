{% extends 'base.html' %}

{% block title %}
Cadastrar Depósito
{% endblock %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow border-0">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">
                    Cadastrar Depósito
                </h4>
            </div>

            <div class="card-body">
                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">
                            Nome do Depósito
                        </label>
                        <input type="text" name="nome" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">
                            Localização
                        </label>
                        <input type="text" name="localizacao" class="form-control" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">
                            Responsável
                        </label>
                        <input type="text" name="responsavel" class="form-control" required>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary flex-fill">
                            Salvar Depósito
                        </button>
                        <a href="{% url 'depositos' %}" class="btn btn-secondary">
                            Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}

{% extends 'base.html' %}
{% block title %}
{% if modo_edicao %}
Editar Funcionário
{% else %}
Cadastrar Funcionário
{% endif %}
{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1 class="fw-bold">
        {% if modo_edicao %}
            Editar Funcionário
        {% else %}
            Cadastrar Funcionário
        {% endif %}
    </h1>
</div>
<div class="card border-0 shadow-sm">
    <div class="card-body">
        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Nome</label>
                <input type="text" name="nome" class="form-control" value="{{ funcionario.first_name|default:'' }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Usuário</label>
                <input type="text" name="username" class="form-control" value="{{ funcionario.username|default:'' }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Senha</label>
                <input type="password" name="senha" class="form-control" {% if not modo_edicao %}required{% endif %}>
            </div>
            <div class="mb-4">
                <label class="form-label">Tipo</label>
                <select name="tipo" class="form-select">
                    <option value="FUNC" {% if perfil.tipo == "FUNC" %}selected{% endif %}>
                        Funcionário
                    </option>
                    <option value="ADMIN" {% if perfil.tipo == "ADMIN" %}selected{% endif %}>
                        Administrador
                    </option>
                </select>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn {% if modo_edicao %}btn-warning{% else %}btn-primary{% endif %} flex-fill">
                    {% if modo_edicao %}
                        Salvar Alterações
                    {% else %}
                        Cadastrar Funcionário
                    {% endif %}
                </button>
                <a href="{% url 'funcionarios' %}" class="btn btn-secondary">
                    Cancelar
                </a>
            </div>
        </form>
    </div>
</div>

{% endblock %}

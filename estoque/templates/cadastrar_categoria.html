{% extends 'base.html' %}

{% block title %}
Cadastrar Categoria
{% endblock %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow border-0">
            <div class="card-header bg-success text-white">
                <h4 class="mb-0">Cadastrar Categoria</h4>
            </div>

            <div class="card-body">
                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="nome" class="form-label">
                            Nome da Categoria
                        </label>
                        <input type="text" id="nome" name="nome" class="form-control" required aria-label="Nome da categoria">
                    </div>

                    <div class="mb-4">
                        <label for="descricao" class="form-label">
                            Descrição
                        </label>
                        <textarea id="descricao" name="descricao" rows="4" class="form-control" aria-label="Descrição da categoria"></textarea>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-success flex-fill">
                            Salvar Categoria
                        </button>
                        <a href="{% url 'cadastrar_produto' %}" class="btn btn-secondary">
                            Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}

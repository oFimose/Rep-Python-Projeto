<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Almoxarifado MF{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f4f6f9;
        }

        .sidebar{
            width:250px;
            min-height:100vh;
            background:#0d6efd;
        }

        .sidebar a{
            color:white;
            text-decoration:none;
            padding:12px 15px;
            display:block;
            border-radius:8px;
            margin-bottom:5px;
        }

        .sidebar a:hover{
            background:rgba(255,255,255,.15);
        }

        .content{
            flex:1;
            padding:30px;
        }

        .card-hover{
            transition:.3s;
        }

        .card-hover:hover{
            transform:translateY(-3px);
        }
    </style>

</head>

<body>
<div class="d-flex">
    <div class="sidebar p-3">
        <h4 class="text-white text-center mb-4">
            📦
            <br>
             Almoxarifado MF
        </h4>

        <a href="{% url 'dashboard' %}">
            Início
        </a>

        <a href="{% url 'produtos' %}">
            Produtos
        </a>

        <a href="{% url 'entrada' %}">
            Entradas
        </a>

        <a href="{% url 'saida' %}">
            Saídas
        </a>

        <a href="{% url 'depositos' %}">
            Depósitos
        </a>

        <div class="mt-5">
            <a href="/">
                Sair
            </a>
        </div>
    </div>

    <div class="content">
        {% block content %}
        {% endblock %}
    </div>
</div>
</body>
</html>
